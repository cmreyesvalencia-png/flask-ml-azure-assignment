name: CD - Continuous Deployment

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # Python 3.7 or higher
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run pre-deployment tests
      run: |
        echo "Running unit tests before deployment..."
        python -m pytest tests/ -v --tb=short
    
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'flask-houseprice-8580'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
    
    - name: Verify deployment
      run: |
        echo "Waiting for deployment to stabilize..."
        sleep 15
        echo "Checking health endpoint..."
        curl -f https://flask-houseprice-8580.azurewebsites.net/health
        echo ""
        echo "✅ Deployment successful!"
        echo "📱 App URL: https://flask-houseprice-8580.azurewebsites.net"